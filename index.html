<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estructura Organizacional · Obras Electromecánicas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════
   TOKENS — LIGHT
══════════════════════════════════════════════ */
:root {
  --red:         #CC0000;
  --red-dim:     #A80000;
  --red-light:   #FDEAEA;
  --bg:          #F2F1EF;
  --surface:     #FFFFFF;
  --surface2:    #EEECE9;
  --border:      #DDDBD8;
  --border-s:    #BDBAB6;
  --text:        #181818;
  --text-2:      #3D3D3D;
  --text-3:      #787878;
  --node-bg:     #FFFFFF;
  --node-border: #D8D6D3;
  --shadow-sm:   0 1px 3px rgba(0,0,0,.07);
  --shadow-md:   0 4px 14px rgba(0,0,0,.10);
  --font-d: 'Bebas Neue', sans-serif;
  --font-b: 'DM Sans', sans-serif;
  --font-m: 'DM Mono', monospace;
}
[data-theme="dark"] {
  --red-light:   rgba(204,0,0,.14);
  --bg:          #0D0D0D;
  --surface:     #171717;
  --surface2:    #222222;
  --border:      #323232;
  --border-s:    #505050;
  --text:        #F0F0F0;
  --text-2:      #C8C8C8;
  --text-3:      #909090;
  --node-bg:     #1E1E1E;
  --node-border: #383838;
  --shadow-sm:   0 1px 3px rgba(0,0,0,.5);
  --shadow-md:   0 4px 14px rgba(0,0,0,.55);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);font-size:14px;line-height:1.6;min-height:100vh;overflow-x:hidden;transition:background .25s,color .25s}

/* ══ LAYOUT ══════════════════════════════════ */
.app{display:grid;grid-template-columns:272px 1fr;grid-template-rows:60px 1fr;grid-template-areas:"hdr hdr" "sb main";height:100vh;transition:grid-template-columns .25s}
.app.sb-collapsed{grid-template-columns:0px 1fr}

/* ══ HEADER ══════════════════════════════════ */
header{grid-area:hdr;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-sm)}
.logo-mark{width:30px;height:30px;background:var(--red);clip-path:polygon(0 0,100% 0,100% 72%,72% 100%,0 100%);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-mark svg{width:16px;height:16px;fill:white}
.hdr-title{font-family:var(--font-d);font-size:19px;letter-spacing:2.5px;color:var(--text)}
.hdr-title span{color:var(--red)}
.hdr-sep{width:1px;height:22px;background:var(--border)}
.hdr-sub{font-family:var(--font-m);font-size:10px;color:var(--text-3);letter-spacing:1.5px;text-transform:uppercase}
.pulse{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--red);margin-right:6px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px}

.search-wrap{position:relative}
.search-wrap svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:13px;height:13px;stroke:var(--text-3);fill:none;stroke-width:2}
#search{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--font-b);font-size:13px;padding:6px 10px 6px 30px;width:190px;outline:none;transition:border-color .2s,width .2s}
#search:focus{border-color:var(--red);width:250px}
#search::placeholder{color:var(--text-3)}

.view-toggle{display:flex;border:1px solid var(--border)}
.vbtn{background:var(--surface2);border:none;border-right:1px solid var(--border);cursor:pointer;color:var(--text-3);padding:6px 14px;font-size:11px;font-family:var(--font-m);letter-spacing:1px;text-transform:uppercase;transition:all .2s}
.vbtn:last-child{border-right:none}
.vbtn.active{background:var(--red);color:white}
.vbtn:not(.active):hover{color:var(--text)}
.btn-refresh{display:flex;align-items:center;gap:6px;background:transparent;border:1px solid var(--border);color:var(--text-2);padding:6px 12px;font-size:11px;font-family:var(--font-m);letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.btn-refresh:hover{border-color:var(--red);color:var(--red)}
.btn-refresh svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}
.btn-refresh.spinning svg{animation:spin .6s linear infinite}
.hdr-obra{font-family:var(--font-m);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;padding:4px 10px;border:1px solid var(--red);color:var(--red);background:var(--red-light)}
.nav-badge{font-family:var(--font-m);font-size:9px;padding:2px 6px;flex-shrink:0}
.nav-badge.assigned{background:#16a34a;color:white}
.nav-badge.tbd{background:#ca8a04;color:white}
.lc-badge{display:inline-block;font-family:var(--font-m);font-size:9px;padding:2px 7px;margin-top:7px}
.lc-badge.assigned{background:#16a34a;color:white}
.lc-badge.tbd{background:#ca8a04;color:white}
.org-node-asignado{font-family:var(--font-m);font-size:9px;margin-top:5px;padding:2px 6px;display:inline-block}
.org-node-asignado.assigned{background:#16a34a;color:white}
.org-node-asignado.tbd{background:#ca8a04;color:white}
.org-node-extra{font-family:var(--font-m);font-size:9px;color:var(--text-3);margin-top:2px}
.detail-asignados{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap}
.detail-asig-label{font-family:var(--font-m);font-size:10px;letter-spacing:1px;color:var(--text-3);text-transform:uppercase}
.detail-asig-chip{font-family:var(--font-m);font-size:11px;padding:3px 10px;border:1px solid}
.detail-asig-chip.assigned{border-color:#16a34a;color:#16a34a;background:rgba(22,163,74,.07)}
.detail-asig-chip.tbd{border-color:#ca8a04;color:#ca8a04;background:rgba(202,138,4,.07)}
#view-tabla{display:none;padding:24px 28px}
.tabla-title{font-family:var(--font-m);font-size:10px;letter-spacing:3px;color:var(--text-3);text-transform:uppercase;margin-bottom:14px}
.tabla-summary{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.summ-chip{font-family:var(--font-m);font-size:10px;padding:4px 12px;border:1px solid var(--border);color:var(--text-3);letter-spacing:.5px}
.summ-chip strong{font-weight:600;color:var(--text);margin-right:5px}
.tabla-wrap{background:var(--surface);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow-sm)}
.resumen-table{width:100%;border-collapse:collapse;font-size:13px}
.resumen-table th{background:var(--surface2);font-family:var(--font-m);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-3);padding:10px 14px;text-align:left;border-bottom:2px solid var(--border);font-weight:400}
.resumen-table th.num{text-align:center;width:60px}
.resumen-table td{padding:10px 14px;border-bottom:1px solid var(--border);color:var(--text-2);vertical-align:middle}
.resumen-table td.num{text-align:center;font-family:var(--font-m);font-size:12px}
.resumen-table tbody tr:hover td{background:var(--surface2)}
.td-titulo{font-weight:500;color:var(--text);cursor:pointer}
.td-titulo:hover{color:var(--red);text-decoration:underline;text-underline-offset:3px}
.td-area{font-family:var(--font-m);font-size:10px;letter-spacing:.5px;text-transform:uppercase;color:var(--red)}
.td-asignados{display:flex;flex-wrap:wrap;gap:5px}
.td-asig-chip{font-family:var(--font-m);font-size:10px;padding:2px 7px;border:1px solid #16a34a;color:#16a34a;background:rgba(22,163,74,.07)}
.estado-badge{font-family:var(--font-m);font-size:9px;padding:2px 9px;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap}
.estado-badge.asignado{background:#16a34a;color:white}
.estado-badge.vacante{background:#ca8a04;color:white}
.tfoot-row td{background:var(--surface2);font-family:var(--font-m);font-size:10px;font-weight:600;color:var(--text);border-top:2px solid var(--border-s) !important;border-bottom:none !important;letter-spacing:.5px}

.btn-pdf{display:flex;align-items:center;gap:6px;background:transparent;border:1px solid var(--border);color:var(--text-2);padding:6px 14px;font-size:11px;font-family:var(--font-m);letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.btn-pdf:hover{border-color:var(--red);color:var(--red)}
.btn-pdf svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}

.theme-btn{width:34px;height:34px;background:var(--surface2);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.theme-btn:hover{border-color:var(--red)}
.theme-btn svg{width:15px;height:15px;stroke:var(--text-2);fill:none;stroke-width:2}

.version{font-family:var(--font-m);font-size:10px;color:var(--text-3);padding:3px 8px;border:1px solid var(--border);letter-spacing:1px}

/* ══ SIDEBAR ══════════════════════════════════ */
aside{grid-area:sb;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;overflow-x:hidden;transition:width .25s,opacity .25s;width:272px;min-width:0}
.app.sb-collapsed aside{width:0;opacity:0;pointer-events:none;border-right:none}
.sb-toggle{width:28px;height:28px;background:var(--surface2);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.sb-toggle:hover{border-color:var(--red);color:var(--red)}
.sb-toggle svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;transition:transform .25s}
.app.sb-collapsed .sb-toggle svg{transform:rotate(180deg)}
aside::-webkit-scrollbar{width:4px}
aside::-webkit-scrollbar-thumb{background:var(--border)}

.sb-section{padding:16px 0 4px}
.sb-label{font-family:var(--font-m);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text-3);padding:0 16px 8px}

.filter-chips{display:flex;flex-wrap:wrap;gap:5px;padding:4px 14px 14px}
.chip{font-family:var(--font-m);font-size:10px;letter-spacing:.5px;text-transform:uppercase;padding:4px 9px;border:1px solid var(--border);background:transparent;color:var(--text-3);cursor:pointer;transition:all .15s}
.chip:hover{border-color:var(--red-dim);color:var(--text)}
.chip.active{background:var(--red);border-color:var(--red);color:white}

.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;border-left:2px solid transparent;transition:all .15s;color:var(--text-2);font-size:13px}
.nav-item:hover{background:var(--surface2);color:var(--text);border-left-color:var(--red-dim)}
.nav-item.active{background:var(--red-light);color:var(--text);border-left-color:var(--red)}
.nav-dot{width:6px;height:6px;border-radius:50%;background:var(--border);flex-shrink:0;transition:background .15s}
.nav-item.active .nav-dot,.nav-item:hover .nav-dot{background:var(--red)}
.nav-text{flex:1;line-height:1.3}
.nav-area{font-size:10px;color:var(--text-3);font-family:var(--font-m)}
.no-results{padding:24px 16px;text-align:center;font-family:var(--font-m);font-size:11px;color:var(--text-3);letter-spacing:1px}

/* ══ MAIN ══════════════════════════════════════ */
main{grid-area:main;overflow-y:auto;overflow-x:hidden}
main::-webkit-scrollbar{width:6px}
main::-webkit-scrollbar-thumb{background:var(--border)}

/* ══ ORG VIEW ══════════════════════════════════ */
#view-org{padding:24px 28px 0;height:calc(100vh - 60px);display:flex;flex-direction:column;box-sizing:border-box}
.org-title{font-family:var(--font-m);font-size:10px;letter-spacing:3px;color:var(--text-3);text-transform:uppercase;margin-bottom:12px;flex-shrink:0}
#org-panzoom-wrap{flex:1;overflow:hidden;position:relative;border:1px solid var(--border);background:var(--surface)}
#org-panzoom-inner{display:inline-flex;padding:40px 60px 60px;cursor:grab;user-select:none;transform-origin:0 0}
#org-panzoom-inner:active{cursor:grabbing}

/* Hint pan/zoom */
.org-hint{position:absolute;bottom:12px;right:14px;font-family:var(--font-m);font-size:9px;color:var(--text-3);letter-spacing:1px;pointer-events:none;opacity:.7}

/* Nodos */
.org-node{background:var(--node-bg);border:1px solid var(--node-border);padding:10px 13px;min-width:140px;max-width:175px;cursor:pointer;transition:border-color .18s,box-shadow .18s;text-align:center;box-shadow:var(--shadow-sm);position:relative;user-select:none}
.org-node:hover{border-color:var(--red-dim);box-shadow:var(--shadow-md)}
.org-node.active{border-color:var(--red);box-shadow:0 0 0 1px var(--red),var(--shadow-md)}
.org-node.active::before{content:'';position:absolute;top:-1px;left:-1px;right:-1px;height:2px;background:var(--red)}
.org-node-title{font-weight:600;font-size:12px;color:var(--text);line-height:1.3;margin-bottom:2px}
.org-node-area{font-family:var(--font-m);font-size:10px;color:var(--text-3)}

/* Nodo raíz externo */
.org-root-node{background:var(--surface2);border:1px dashed var(--border-s);padding:8px 20px;font-family:var(--font-m);font-size:10px;color:var(--text-3);letter-spacing:1px;text-transform:uppercase}

/* Conectores */
.org-vline{display:flex;justify-content:center}
.org-vline-inner{width:1px;height:20px;background:var(--border)}
.org-hline{height:1px;background:var(--border)}

/* Filas y columnas del árbol */
.org-row{display:flex;justify-content:center;align-items:flex-start}
.org-col{display:flex;flex-direction:column;align-items:center}

/* ══ LIST VIEW ══════════════════════════════════ */
#view-list{display:none;padding:24px 28px}
#list-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:13px}
.list-card{background:var(--surface);border:1px solid var(--border);padding:17px;cursor:pointer;transition:all .2s;box-shadow:var(--shadow-sm)}
.list-card:hover{border-color:var(--red-dim);transform:translateY(-2px);box-shadow:var(--shadow-md)}
.lc-area{font-family:var(--font-m);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--red);margin-bottom:5px}
.lc-title{font-family:var(--font-d);font-size:20px;letter-spacing:2px;color:var(--text);line-height:1.1;margin-bottom:5px}
.lc-rep{font-size:12px;color:var(--text-3)}
.lc-preview{margin-top:9px;padding-top:9px;border-top:1px solid var(--border);font-size:11px;color:var(--text-3);line-height:1.5}

/* ══ DETAIL VIEW ══════════════════════════════ */
#view-detail{display:none;padding:32px 38px;max-width:960px}
#view-detail.show{display:block}

.detail-back{display:flex;align-items:center;gap:7px;font-family:var(--font-m);font-size:10px;color:var(--text-3);letter-spacing:1px;text-transform:uppercase;cursor:pointer;margin-bottom:26px;width:fit-content;transition:color .15s}
.detail-back:hover{color:var(--red)}
.detail-back svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}

.detail-header{border-left:3px solid var(--red);padding-left:17px;margin-bottom:24px}
.detail-area-tag{font-family:var(--font-m);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--red);margin-bottom:5px}
.detail-titulo{font-family:var(--font-d);font-size:42px;letter-spacing:3px;color:var(--text);line-height:1;margin-bottom:9px}
.detail-rep{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--text-3)}
.detail-rep-link{color:var(--red);cursor:pointer;text-decoration:underline;text-underline-offset:3px}
.detail-rep-link:hover{color:var(--red-dim)}

.detail-sections{display:grid;grid-template-columns:1fr 1fr 1fr;gap:15px;margin-top:18px}
.detail-section{background:var(--surface);border:1px solid var(--border);padding:17px;box-shadow:var(--shadow-sm);animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.sec-hdr{display:flex;align-items:center;gap:8px;margin-bottom:13px;padding-bottom:9px;border-bottom:1px solid var(--border)}
.sec-icon{width:25px;height:25px;background:var(--red-light);display:flex;align-items:center;justify-content:center}
.sec-icon svg{width:13px;height:13px;stroke:var(--red);fill:none;stroke-width:2}
.sec-label{font-family:var(--font-d);font-size:15px;letter-spacing:2px;color:var(--text)}
.sec-list{list-style:none;display:flex;flex-direction:column;gap:9px}
.sec-list li{display:flex;gap:8px;font-size:13px;color:var(--text-2);line-height:1.5}
.sec-list li::before{content:'—';color:var(--red);flex-shrink:0;font-size:11px;margin-top:2px}

.detail-subs{margin-top:16px;padding:17px;background:var(--surface);border:1px solid var(--border)}
.subs-title{font-family:var(--font-m);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text-3);margin-bottom:9px}
.subs-chips{display:flex;flex-wrap:wrap;gap:7px}
.sub-chip{font-size:12px;padding:5px 12px;border:1px solid var(--border);color:var(--text-2);cursor:pointer;background:var(--surface2);transition:all .15s}
.sub-chip:hover{border-color:var(--red);color:var(--red)}

@media(max-width:1100px){.detail-sections{grid-template-columns:1fr 1fr}}
@media(max-width:768px){.app{grid-template-columns:1fr;grid-template-areas:"hdr" "main"}aside{display:none}.detail-sections{grid-template-columns:1fr}.detail-titulo{font-size:28px}}

/* ══════════════════════════════════════════════
   @media print — PDF completo A4
   IMPORTANTE: oculta TODO lo de pantalla,
   muestra solo #pdf-cover y #pdf-body
══════════════════════════════════════════════ */
@media print {
  @page { size:A4 portrait; margin:11mm 13mm 11mm 13mm }

  /* Ocultar absolutamente todo lo de la app */
  .app,
  header, aside, main,
  #view-org, #view-list, #view-detail { display:none !important }

  html,body { background:white !important; color:#111 !important; font-size:10pt; margin:0; padding:0 }

  /* Mostrar contenedores PDF */
  #pdf-cover { display:flex !important }
  #pdf-body  { display:block !important }

  /* ── CARÁTULA ── */
  #pdf-cover {
    flex-direction:column;
    justify-content:flex-start;
    min-height:277mm;
    page-break-after:always;
    position:relative;
    padding:0;
  }

  .cover-accent-bar {
    width:100%;
    height:6mm;
    background:#CC0000;
    margin-bottom:0;
  }

  .cover-body {
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:18mm 16mm 12mm;
    border-left:4mm solid #CC0000;
    margin:8mm 0 0 0;
  }

  .cover-tag {
    font-family:'DM Mono',monospace;
    font-size:8pt;letter-spacing:3px;
    text-transform:uppercase;color:#888;
    margin-bottom:5mm;
  }

  .cover-title {
    font-family:'Bebas Neue',sans-serif;
    font-size:52pt;letter-spacing:4px;
    color:#111;line-height:.95;
    margin-bottom:3mm;
  }

  .cover-sub {
    font-family:'Bebas Neue',sans-serif;
    font-size:22pt;letter-spacing:3px;
    color:#CC0000;
    margin-bottom:12mm;
  }

  .cover-divider {
    width:30mm;height:1pt;
    background:#CC0000;
    margin-bottom:8mm;
  }

  .cover-meta {
    font-family:'DM Mono',monospace;
    font-size:8.5pt;color:#555;
    letter-spacing:.5px;line-height:2;
  }

  .cover-meta strong { color:#111; font-weight:500; }

  .cover-footer {
    position:absolute;
    bottom:0;left:0;right:0;
    border-top:1pt solid #DDD;
    padding:3mm 13mm;
    display:flex;justify-content:space-between;align-items:center;
    font-family:'DM Mono',monospace;
    font-size:7pt;color:#AAA;
  }

  .cover-footer-red { color:#CC0000; font-weight:500; }

  /* ── FICHAS DE PUESTO ── */
  #pdf-body { page-break-before:avoid }

  .pdf-page {
    page-break-before:always;
    padding:0;
    min-height:277mm;
    display:flex;
    flex-direction:column;
    position:relative;
  }

  .pdf-page-hdr {
    border-left:4mm solid #CC0000;
    padding-left:5mm;
    margin-bottom:6mm;
  }

  .pdf-area {
    font-family:'DM Mono',monospace;
    font-size:7pt;letter-spacing:2px;
    text-transform:uppercase;color:#CC0000;
    margin-bottom:1mm;
  }

  .pdf-titulo {
    font-family:'Bebas Neue',sans-serif;
    font-size:32pt;letter-spacing:3px;
    color:#111;line-height:1;
    margin-bottom:1.5mm;
  }

  .pdf-rep {
    font-family:'DM Mono',monospace;
    font-size:8pt;color:#666;
  }

  .pdf-cols {
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:4mm;
    margin-top:5mm;
    flex:1;
  }

  .pdf-col {
    border:0.5pt solid #DDD;
    padding:4mm;
  }

  .pdf-col-title {
    font-family:'Bebas Neue',sans-serif;
    font-size:11pt;letter-spacing:1.5px;
    color:#111;
    border-bottom:0.5pt solid #EEE;
    padding-bottom:2mm;margin-bottom:3mm;
  }

  .pdf-col-title span {
    display:inline-block;
    width:2mm;height:6pt;
    background:#CC0000;
    margin-right:2mm;
    vertical-align:middle;
  }

  .pdf-list { list-style:none;padding:0 }
  .pdf-list li {
    font-family:'DM Sans',sans-serif;
    font-size:8pt;color:#333;
    line-height:1.5;margin-bottom:2mm;
    padding-left:8pt;text-indent:-8pt;
  }
  .pdf-list li::before { content:'— ';color:#CC0000 }

  .pdf-page-footer {
    margin-top:auto;
    padding-top:3mm;
    border-top:0.5pt solid #EEE;
    display:flex;justify-content:space-between;
    font-family:'DM Mono',monospace;
    font-size:7pt;color:#AAA;
  }
}

/* Ocultar en pantalla */
#pdf-cover,#pdf-body{display:none}
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header>
    <button class="sb-toggle" id="sb-toggle" onclick="toggleSidebar()" title="Colapsar sidebar"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
    <div class="logo-mark">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </div>
    <span class="hdr-title">GOE <span>ORG</span></span>
    <div class="hdr-sep"></div>
    <span class="hdr-sub"><span class="pulse"></span>Obras Electromecánicas</span>

    <span id="hdr-obra" class="hdr-obra" style="display:none"></span>
    <div class="hdr-right">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search" placeholder="Buscar puesto..." autocomplete="off">
      </div>
      <div class="view-toggle">
        <button class="vbtn active" id="btn-org" onclick="switchView('org')">Org</button>
        <button class="vbtn" id="btn-list" onclick="switchView('list')">Lista</button>
        <button class="vbtn" id="btn-tabla" onclick="switchView('tabla')" style="display:none">Tabla</button>
      </div>
      <button class="btn-refresh" id="btn-refresh" onclick="refreshData()">
        <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
        Actualizar
      </button>
      <button class="btn-pdf" onclick="exportPDF()">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Exportar PDF
      </button>
      <button class="theme-btn" onclick="toggleTheme()" title="Cambiar tema">
        <svg id="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg id="icon-moon" style="display:none" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      </button>
      <span class="version">v05</span>
    </div>
  </header>

  <!-- SIDEBAR -->
  <aside>
    <div class="sb-section">
      <div class="sb-label">Filtrar por área</div>
      <div class="filter-chips" id="filter-chips"></div>
    </div>
    <div class="sb-section">
      <div class="sb-label">Puestos</div>
      <div id="nav-list"></div>
    </div>
  </aside>

  <!-- MAIN -->
  <main id="main">
    <div id="view-org">
      <div id="org-panzoom-wrap">
        <div id="org-panzoom-inner"></div>
        <span class="org-hint">Scroll: zoom · Drag: pan · Doble click: reset</span>
      </div>
    </div>
    <div id="view-list"><div id="list-cards"></div></div>
    <div id="view-tabla"></div>
    <div id="view-detail">
      <div class="detail-back" onclick="closeDetail()">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        Volver
      </div>
      <div id="detail-content"></div>
    </div>
  </main>
</div>

<!-- PDF — solo visible en print -->
<div id="pdf-cover"></div>
<div id="pdf-body"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/panzoom/9.4.3/panzoom.min.js"></script>
<script>
const GAS_URL='https://script.google.com/macros/s/AKfycbxsJTP8o_F01Njtwk7Z2Oz3Z8OhNc__g9EbPGRzoP7DqfuarMr86LNpoIXlTsTJk6t4/exec';
let ROLES=[],rolesById={},AREAS=[],obraActual='GENERAL',modoObra=false;
let currentView='org',currentRole=null,activeFilter='todos',searchTerm='',prevView='org';
const VIEWS=['org','list','tabla'];

async function fetchData(){
  const res=await fetch(GAS_URL+'?obra='+encodeURIComponent(obraActual));
  if(!res.ok)throw new Error('HTTP '+res.status);
  const d=await res.json();
  if(!d.ok)throw new Error(d.error||'Error desconocido');
  return d.roles;
}
function initState(){
  rolesById={};
  ROLES.forEach(r=>rolesById[r.id_rol]=r);
  AREAS=['todos',...new Set(ROLES.map(r=>r.area))];
}
(async function init(){
  const p=new URLSearchParams(window.location.search);
  obraActual=p.get('obra')||'GENERAL';
  modoObra=obraActual!=='GENERAL';
  if(modoObra){
    const b=document.getElementById('hdr-obra');
    b.textContent='Obra: '+obraActual; b.style.display='';
    document.getElementById('btn-tabla').style.display='';
  }
  try{
    ROLES=await fetchData(); initState();
    buildSidebar(); buildOrg();
  }catch(err){
    console.error(err);
    alert('Error al cargar: '+err.message);
  }
})();

async function refreshData(){
  const btn=document.getElementById('btn-refresh');
  btn.classList.add('spinning'); btn.disabled=true;
  try{
    ROLES=await fetchData(); initState(); buildSidebar();
    if(currentView==='org')buildOrg();
    else if(currentView==='list')renderListView();
    else if(currentView==='tabla')renderTablaView();
    else if(currentView==='detail'&&currentRole)selectRole(currentRole);
  }catch(err){alert('Error al actualizar: '+err.message);}
  finally{btn.classList.remove('spinning');btn.disabled=false;}
}

function getSubs(id){return ROLES.filter(r=>r.reporta_a_id===id)}

function asignadoBadgeNode(r){
  if(!modoObra)return '';
  if(!r.asignados||!r.asignados.length)return '<span class="org-node-asignado tbd">TBD</span>';
  const ex=r.asignados.length>1?`<div class="org-node-extra">+${r.asignados.length-1} mas</div>`:'';
  return `<span class="org-node-asignado assigned">${r.asignados[0]}</span>${ex}`;
}
function asignadosChips(r){
  if(!modoObra)return '';
  if(!r.asignados||!r.asignados.length)return '<span class="detail-asig-chip tbd">TBD - Sin asignar</span>';
  return r.asignados.map(n=>`<span class="detail-asig-chip assigned">${n}</span>`).join('');
}
function asignadoBadgeInline(r){
  if(!modoObra)return '';
  if(!r.asignados||!r.asignados.length)return '<span class="nav-badge tbd">TBD</span>';
  return '<span class="nav-badge assigned">OK</span>';
}

function toggleSidebar(){
  document.querySelector('.app').classList.toggle('sb-collapsed');
}

function toggleTheme(){
  const d=document.documentElement,dark=d.getAttribute('data-theme')==='dark';
  d.setAttribute('data-theme',dark?'light':'dark');
  document.getElementById('icon-sun').style.display=dark?'':'none';
  document.getElementById('icon-moon').style.display=dark?'none':'';
}

function buildSidebar(){
  document.getElementById('filter-chips').innerHTML=
    AREAS.map(a=>`<div class="chip ${a==='todos'?'active':''}" onclick="filterArea('${a}')">${a}</div>`).join('');
  renderNavList();
}
function filterArea(a){
  activeFilter=a;
  document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('active',c.textContent===a));
  renderNavList();
}
function renderNavList(){
  const f=ROLES.filter(r=>(activeFilter==='todos'||r.area===activeFilter)&&(!searchTerm||r.titulo.toLowerCase().includes(searchTerm.toLowerCase())));
  const nl=document.getElementById('nav-list');
  if(!f.length){nl.innerHTML='<div class="no-results">Sin resultados</div>';return;}
  nl.innerHTML=f.map(r=>`
    <div class="nav-item ${currentRole===r.id_rol?'active':''}" onclick="selectRole('${r.id_rol}')">
      <div class="nav-dot"></div>
      <div class="nav-text">${r.titulo}<div class="nav-area">${r.area}</div></div>
      ${asignadoBadgeInline(r)}
    </div>`).join('');
}

function switchView(v){
  currentView=v;
  VIEWS.forEach(x=>{
    const btn=document.getElementById('btn-'+x);
    if(btn)btn.classList.toggle('active',x===v);
    const el=document.getElementById('view-'+x);
    if(el)el.style.display=x===v?(x==='org'?'flex':'block'):'none';
  });
  document.getElementById('view-detail').classList.remove('show');
  if(v==='list')renderListView();
  if(v==='tabla')renderTablaView();
}

let _panzoom = null; // instancia panzoom activa

function buildOrg(){
  const inner = document.getElementById('org-panzoom-inner');
  const wrap  = document.getElementById('org-panzoom-wrap');

  // -- Destruir instancia panzoom anterior si existe --
  if(_panzoom){ _panzoom.dispose(); _panzoom=null; }

  // -- Limpiar contenido anterior --
  inner.innerHTML = '';

  // -- Título con stats --
  const nAsig = modoObra ? ROLES.filter(r=>r.asignados&&r.asignados.length>0).length : null;
  const label = modoObra
    ? `Obra ${obraActual} · ${ROLES.length} Puestos · ${nAsig} Asignados · ${ROLES.length-nAsig} Vacantes`
    : `Estructura General · ${ROLES.length} Puestos`;
  // El título va FUERA del inner (no se mueve con el pan)
  let titleEl = document.getElementById('org-dyn-title');
  if(!titleEl){
    titleEl = document.createElement('div');
    titleEl.id = 'org-dyn-title';
    titleEl.className = 'org-title';
    wrap.parentElement.insertBefore(titleEl, wrap);
  }
  titleEl.textContent = label;

  // -- Helpers HTML --
  const vl = () => `<div class="org-vline"><div class="org-vline-inner"></div></div>`;

  const nodeHtml = (r, asignadoLabel='') => `
    <div class="org-node ${currentRole===r.id_rol?'active':''}" id="node-${r.id_rol}" onclick="selectRole('${r.id_rol}')">
      <div class="org-node-title">${r.titulo}</div>
      <div class="org-node-area">${r.area}</div>
      ${modoObra ? (asignadoLabel
        ? `<span class="org-node-asignado assigned">${asignadoLabel}</span>`
        : `<span class="org-node-asignado tbd">TBD</span>`)
      : ''}
    </div>`;

  function nodesForId(id){
    const r = rolesById[id]; if(!r) return '';
    if(!modoObra || !r.asignados || r.asignados.length===0) return nodeHtml(r,'');
    if(r.asignados.length===1){
      const tit = r.titulosExtra&&r.titulosExtra[0] ? r.titulosExtra[0] : r.titulo;
      return nodeHtml(Object.assign({},r,{titulo:tit}), r.asignados[0]);
    }
    let h = '<div style="display:flex;flex-direction:column;align-items:center;gap:6px">';
    r.asignados.forEach((nombre,i)=>{
      const tit = i===0 ? r.titulo : (r.titulosExtra&&r.titulosExtra[i-1] ? r.titulosExtra[i-1] : r.titulo);
      h += nodeHtml(Object.assign({},r,{titulo:tit}), nombre);
    });
    return h + '</div>';
  }

  function sub(id, gap=12){
    const r = rolesById[id]; if(!r) return '';
    const ch = getSubs(id);
    let h = `<div style="display:flex;flex-direction:column;align-items:center">${nodesForId(id)}`;
    if(ch.length){
      h += vl();
      if(ch.length===1){
        h += sub(ch[0].id_rol, gap);
      } else {
        h += `<div style="display:flex;align-items:flex-start;gap:${gap}px;position:relative;">`;
        h += `<div style="position:absolute;top:0;left:50%;transform:translateX(-50%);width:calc(100% - 160px);height:1px;background:var(--border)"></div>`;
        ch.forEach(c=>{ h += `<div style="display:flex;flex-direction:column;align-items:center">${vl()}${sub(c.id_rol,gap)}</div>`; });
        h += `</div>`;
      }
    }
    return h + `</div>`;
  }

  // -- Construir árbol --
  const roots = ROLES.filter(r=>r.reporta_a_id==='gerente_operaciones');
  let h = `<div style="display:flex;flex-direction:column;align-items:center">`;
  h += `<div class="org-root-node">Gerente de Operaciones</div>${vl()}`;
  if(roots.length===1){
    h += sub(roots[0].id_rol, 10);
  } else {
    h += `<div style="display:flex;gap:32px;justify-content:center;align-items:flex-start;position:relative;">`;
    h += `<div style="position:absolute;top:0;left:50%;transform:translateX(-50%);width:calc(100% - 200px);height:1px;background:var(--border)"></div>`;
    roots.forEach(r=>{ h += `<div style="display:flex;flex-direction:column;align-items:center">${vl()}${sub(r.id_rol,10)}</div>`; });
    h += `</div>`;
  }
  h += `</div>`;
  inner.innerHTML = h;

  // -- Inicializar panzoom --
  _panzoom = Panzoom(inner, {
    maxScale: 3,
    minScale: 0.3,
    step: 0.1,
    contain: 'outside',
    excludeClass: 'org-node',  // clicks en nodos no activan pan
  });
  // Zoom con rueda del mouse (solo bind una vez)
  if(!wrap.dataset.panzoomBound){
    wrap.addEventListener('wheel', (e)=>_panzoom.zoomWithWheel(e), {passive:true});
    wrap.addEventListener('dblclick', ()=>_panzoom.reset({animate:true}));
    wrap.dataset.panzoomBound = '1';
  }
}

function renderListView(){
  const f=ROLES.filter(r=>(activeFilter==='todos'||r.area===activeFilter)&&(!searchTerm||r.titulo.toLowerCase().includes(searchTerm.toLowerCase())));
  document.getElementById('list-cards').innerHTML=f.map(r=>`
    <div class="list-card" onclick="selectRole('${r.id_rol}')">
      <div class="lc-area">${r.area}</div>
      <div class="lc-title">${r.titulo}</div>
      <div class="lc-rep">--> ${r.reporta_a}</div>
      <div class="lc-preview">${r.funciones[0]?r.funciones[0].substring(0,100)+'...':''}</div>
      ${modoObra?(r.asignados&&r.asignados.length?`<span class="lc-badge assigned">${r.asignados.join(' - ')}</span>`:'<span class="lc-badge tbd">Sin asignar</span>'):''}
    </div>`).join('');
}

function renderTablaView(){
  const total=ROLES.length;
  const nAsig=ROLES.filter(r=>r.asignados&&r.asignados.length>0).length;
  const nVac=total-nAsig;
  const nPersonas=ROLES.reduce((s,r)=>s+(r.asignados?r.asignados.length:0),0);
  const rows=ROLES.map(r=>{
    const est=r.asignados&&r.asignados.length>0;
    const chips=est
      ?`<div class="td-asignados">${r.asignados.map(n=>`<span class="td-asig-chip">${n}</span>`).join('')}</div>`
      :`<span style="font-family:var(--font-m);font-size:10px;color:var(--text-3)">-</span>`;
    return `<tr>
      <td class="td-titulo" onclick="selectRole('${r.id_rol}')">${r.titulo}</td>
      <td><span class="td-area">${r.area}</span></td>
      <td>${chips}</td>
      <td class="num">${r.asignados?r.asignados.length:0}</td>
      <td><span class="estado-badge ${est?'asignado':'vacante'}">${est?'Asignado':'Vacante'}</span></td>
    </tr>`;
  }).join('');
  document.getElementById('view-tabla').innerHTML=`
    <div class="tabla-title">Resumen de Personal - Obra ${obraActual}</div>
    <div class="tabla-summary">
      <div class="summ-chip"><strong>${total}</strong> Puestos</div>
      <div class="summ-chip"><strong>${nAsig}</strong> Asignados</div>
      <div class="summ-chip"><strong>${nVac}</strong> Vacantes</div>
      <div class="summ-chip"><strong>${nPersonas}</strong> Personas en nomina</div>
    </div>
    <div class="tabla-wrap"><table class="resumen-table">
      <thead><tr><th>Puesto</th><th>Area</th><th>Asignado/s</th><th class="num">N</th><th>Estado</th></tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr class="tfoot-row"><td colspan="3">Total personas en nomina</td><td class="num">${nPersonas}</td><td></td></tr></tfoot>
    </table></div>`;
}

function selectRole(id){
  currentRole=id; const r=rolesById[id]; if(!r)return;
  prevView=currentView!=='detail'?currentView:prevView;
  renderNavList();
  document.querySelectorAll('.org-node').forEach(n=>n.classList.toggle('active',n.id===`node-${id}`));
  VIEWS.forEach(v=>{const el=document.getElementById('view-'+v);if(el)el.style.display='none';});
  const det=document.getElementById('view-detail');
  det.classList.add('show'); currentView='detail';
  const subs=getSubs(id);
  const asigSec=modoObra?`<div class="detail-asignados"><span class="detail-asig-label">Asignado:</span>${asignadosChips(r)}</div>`:'';
  document.getElementById('detail-content').innerHTML=`
    <div class="detail-header">
      <div class="detail-area-tag">${r.area}</div>
      <div class="detail-titulo">${r.titulo}</div>
      <div class="detail-rep">Reporta a: ${r.reporta_a_id!=='gerente_operaciones'
        ?`<span class="detail-rep-link" onclick="selectRole('${r.reporta_a_id}')">${r.reporta_a}</span>`
        :`<span>${r.reporta_a}</span>`}</div>
      ${asigSec}
    </div>
    <div class="detail-sections">
      <div class="detail-section"><div class="sec-hdr"><div class="sec-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><span class="sec-label">Funciones</span></div><ul class="sec-list">${r.funciones.map(f=>`<li>${f}</li>`).join('')}</ul></div>
      <div class="detail-section"><div class="sec-hdr"><div class="sec-icon"><svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div><span class="sec-label">Responsabilidades</span></div><ul class="sec-list">${r.responsabilidades.map(f=>`<li>${f}</li>`).join('')}</ul></div>
      <div class="detail-section"><div class="sec-hdr"><div class="sec-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div><span class="sec-label">Entregables</span></div><ul class="sec-list">${r.entregables.map(f=>`<li>${f}</li>`).join('')}</ul></div>
    </div>
    ${subs.length?`<div class="detail-subs"><div class="subs-title">Reportan a este puesto</div><div class="subs-chips">${subs.map(s=>`<div class="sub-chip" onclick="selectRole('${s.id_rol}')">${s.titulo}</div>`).join('')}</div></div>`:''}`;
  det.scrollTop=0;
}

function closeDetail(){
  document.getElementById('view-detail').classList.remove('show');
  currentRole=null; currentView=prevView;
  VIEWS.forEach(v=>{
    const el=document.getElementById('view-'+v); if(el)el.style.display=v===prevView?'block':'none';
    const btn=document.getElementById('btn-'+v); if(btn)btn.classList.toggle('active',v===prevView);
  });
  renderNavList();
  document.querySelectorAll('.org-node').forEach(n=>n.classList.remove('active'));
}

function exportPDF(){
  const fecha=new Date().toLocaleDateString('es-AR',{day:'2-digit',month:'long',year:'numeric'});
  const obraLabel=modoObra?'Obra '+obraActual:'Estructura General';
  document.getElementById('pdf-cover').innerHTML=`
    <div class="cover-accent-bar"></div>
    <div class="cover-body">
      <div class="cover-tag">Gerencia de Obras Electromecanicas</div>
      <div class="cover-title">MANUAL DE<br>ORGANIZACION</div>
      <div class="cover-sub">Descripcion de Puestos y Perfiles</div>
      <div class="cover-divider"></div>
      <div class="cover-meta">
        <strong>Documento:</strong> GOE-ORG-001<br>
        <strong>Revision:</strong> v05 - ${fecha}<br>
        <strong>Alcance:</strong> ${obraLabel}<br>
        <strong>Puestos:</strong> ${ROLES.length}<br>
        <strong>Marco normativo:</strong> PMI/PMBOK - ISO 9001 - ISO 45001 - Ley 19.587 - CCT Construccion
      </div>
    </div>
    <div class="cover-footer">
      <span>GOE - Organizacion - Obras Electromecanicas</span>
      <span class="cover-footer-red">Confidencial - Uso Interno</span>
    </div>`;
  document.getElementById('pdf-body').innerHTML=ROLES.map((r,i)=>{
    const asigHtml=modoObra?(r.asignados&&r.asignados.length
      ?r.asignados.map(n=>`<span class="pdf-asig-chip assigned">${n}</span>`).join(' ')
      :'<span class="pdf-asig-chip tbd">Sin asignar</span>'):'';
    return `<div class="pdf-page">
      <div class="pdf-page-hdr">
        <div class="pdf-area">${r.area}</div>
        <div class="pdf-titulo">${r.titulo}</div>
        <div class="pdf-rep">Reporta a: ${r.reporta_a}</div>
        ${asigHtml?`<div class="pdf-asignado">${asigHtml}</div>`:''}
      </div>
      <div class="pdf-cols">
        <div class="pdf-col"><div class="pdf-col-title"><span></span>Funciones</div><ul class="pdf-list">${r.funciones.map(f=>`<li>${f}</li>`).join('')}</ul></div>
        <div class="pdf-col"><div class="pdf-col-title"><span></span>Responsabilidades</div><ul class="pdf-list">${r.responsabilidades.map(f=>`<li>${f}</li>`).join('')}</ul></div>
        <div class="pdf-col"><div class="pdf-col-title"><span></span>Entregables / Reportes</div><ul class="pdf-list">${r.entregables.map(f=>`<li>${f}</li>`).join('')}</ul></div>
      </div>
      <div class="pdf-page-footer"><span>GOE-ORG-001 - ${r.titulo}</span><span>Pag. ${i+2} / ${ROLES.length+1}</span></div>
    </div>`;
  }).join('');
  const prev=document.documentElement.getAttribute('data-theme');
  document.documentElement.setAttribute('data-theme','light');
  setTimeout(()=>{window.print();setTimeout(()=>{document.documentElement.setAttribute('data-theme',prev);document.getElementById('pdf-cover').innerHTML='';document.getElementById('pdf-body').innerHTML='';},1200);},200);
}

document.getElementById('search').addEventListener('input',function(){
  searchTerm=this.value.trim(); renderNavList();
  if(currentView==='list')renderListView();
  if(currentView==='tabla')renderTablaView();
});
</script>
